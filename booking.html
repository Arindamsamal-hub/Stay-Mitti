<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Stay - StayMitti</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="StayMitti.css">
    <link rel="stylesheet" href="booking.css">
    <script src="booking.js" defer></script>
</head>
<body class="booking-page-bg">
    <nav>
        <div class="logo"><a href="StayMitti.html" style="text-decoration: none; color: inherit;">Stay<span>Mitti</span></a></div>
    </nav>

    <div class="container booking-container">
        <div class="booking-header">
            <h2>Complete Your Booking</h2>
            <p id="selected-hotel-name" style="font-weight: bold; font-size: 1.2rem; color: var(--primary-color);">Loading hotel details...</p>
            <p id="selected-hotel-location" style="font-size: 0.95rem; color: #666; margin-top: 5px;"></p>
        </div>

        <form id="bookingForm" class="booking-form" action="https://formspree.io/f/mzdyyokw" method="POST">
            
            <input type="hidden" id="hotelNameInput" name="hotelName" value="">

            <div class="form-section">
                <h3>1. Guest Details</h3>
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" required placeholder="Enter your full name">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="name@example.com">
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input 
                            type="number" 
                            id="phone" 
                            name="phone" 
                            required 
                            pattern="[0-9]{10}" 
                            maxlength="10" 
                            minlength="10" 
                            placeholder="e.g. xxxxxxxxxx"
                            title="Please enter exactly 10 digits"
                        >
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>2. Stay Details</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="checkin">Check-in Date</label>
                        <input type="date" id="checkin" name="checkin" required>
                    </div>
                    <div class="form-group">
                        <label for="checkout">Check-out Date</label>
                        <input type="date" id="checkout" name="checkout" required>
                    </div>
                </div>
                <div class="error-msg" id="dateError">Check-out date must be after check-in date.</div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="guests">Number of Guests</label>
                        <input type="number" id="guests" name="guests" min="1" max="10" required placeholder="Select" value="2">
                    </div>
                    <div class="form-group">
                        <label for="roomType">Room Type</label>
                        <select id="roomType" name="roomType" required>
                            <option value="" disabled selected>Select</option>
                            <option value="deluxe">Deluxe Heritage Room</option>
                            <option value="suite">Royal Suite</option>
                            <option value="villa">Pool Villa</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="requests">Special Requests (Optional)</label>
                    <textarea id="requests" name="requests" rows="3" placeholder="Late check-in, dietary requirements, etc."></textarea>
                </div>
            </div>

            <div class="price-summary" style="background: #fff3e0; padding: 15px; border-radius: 8px; text-align: right; margin-bottom: 20px; border: 1px solid #ffe0b2;">
                <span style="font-size: 1.1rem; color: #555;">Total Amount:</span>
                <span id="totalAmountDisplay" style="font-size: 1.5rem; font-weight: bold; color: var(--primary-color); margin-left: 10px;">₹0</span>
                <div id="nightCountDisplay" style="font-size: 0.9rem; color: #777; margin-top: 5px;">Select dates to see total</div>
            </div>

            <div class="form-submit">
                <button type="submit" class="confirm-btn">Confirm Booking</button>
                <p class="secure-note"><i class="fas fa-lock"></i> Your information is safe and secure.</p>
            </div>
        </form>
    </div>
</body>
</html>
